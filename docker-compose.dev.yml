services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cloud-compute-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dev@SqlServer1!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver_data:
